# ──────────────────────────────────────────────────────────────────────────────
# AWX nginx — fragment monté dans /etc/nginx/default.d/awx.conf
# HTTP simple (Community n'inclut pas de reverse proxy TLS)
# ──────────────────────────────────────────────────────────────────────────────

# Assets statiques servis directement par nginx
location /static {
    alias /var/lib/awx/public/static;
}

# WebSocket → Daphne (ASGI) sur le port 8051
location /websocket {
    proxy_pass         http://127.0.0.1:8051;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade    $http_upgrade;
    proxy_set_header   Connection "upgrade";
    proxy_set_header   Host       $host;
    proxy_read_timeout 86400s;
}

# Toutes les autres requêtes → uWSGI (Django) sur le port 8050
location / {
    uwsgi_pass             127.0.0.1:8050;
    include                /etc/nginx/uwsgi_params;
    uwsgi_read_timeout     120s;
    uwsgi_connect_timeout  10s;
    uwsgi_send_timeout     120s;
    uwsgi_param HTTP_HOST            $http_host;
    uwsgi_param HTTP_X_REAL_IP       $remote_addr;
    uwsgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
}
